<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday PRASHI</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial;background:linear-gradient(-45deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3);background-size:400% 400%;animation:bg 12s infinite}
@keyframes bg{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
#stage{position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center}
h1{margin:5px;opacity:0;transform:translateY(-30px)}
#h{font-size:68px;animation:show .8s forwards .2s}
#b{font-size:56px;color:#fff799;animation:show .8s forwards 1.1s}
#n{font-size:86px;color:#ff1744;text-shadow:0 0 10px #fff,0 0 25px hotpink,0 0 45px deeppink;animation:show .8s forwards 2s,glow 1.3s infinite alternate 3s}
@keyframes show{to{opacity:1;transform:none}}
@keyframes glow{to{text-shadow:0 0 20px #fff,0 0 40px hotpink,0 0 70px deeppink}}
#sub{margin-top:12px;font-size:22px}
#gift{position:absolute;padding:16px 28px;border:none;border-radius:40px;background:#ff4081;color:#fff;font-size:20px;cursor:pointer;left:50%;top:75%;transform:translateX(-50%);box-shadow:0 0 20px rgba(255,255,255,.6)}
.float{position:absolute;font-size:38px;animation:float linear infinite}
@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-120vh)}}
#msg{position:absolute;bottom:18px;font-size:22px}
canvas{position:absolute;inset:0;pointer-events:none}
</style></head><body>
<canvas id=c></canvas>
<div id=stage>
<h1 id=h>HAPPY</h1><h1 id=b>BIRTHDAY</h1><h1 id=n>PRASHI</h1>
<div id=sub>🎉 Wishing you endless smiles today! 🎂</div>
<button id=gift>🎁 Tap here to open your Birthday Gift ❤️</button>
<div id=msg>Catch the gift if you can! 😄</div>
</div>
<script>
for(let i=0;i<28;i++){let d=document.createElement('div');d.className='float';d.textContent=['🎈','✨','🎊','🎉'][i%4];d.style.left=Math.random()*100+'vw';d.style.animationDuration=(6+Math.random()*6)+'s';d.style.animationDelay=(-Math.random()*10)+'s';document.body.appendChild(d);}
let tries=0,msgs=["😂 Too Slow!","😜 Almost!","🎂 Keep Trying!","❤️ Not Yet!","🤣 Nice Try!"];
gift.onmouseover=move;gift.ontouchstart=e=>{e.preventDefault();move()}
function move(){tries++;msg.textContent=msgs[tries%msgs.length];
if(tries<18){gift.style.left=Math.random()*80+10+'%';gift.style.top=Math.random()*75+10+'%';}
else{gift.onmouseover=null;gift.ontouchstart=null;gift.onclick=finish;msg.textContent="🎁 Okay... you win! Tap it now!";}}
function finish(){stage.innerHTML="<h1 style='opacity:1;font-size:64px'>🎉 HAPPY BIRTHDAY</h1><h1 style='opacity:1;font-size:82px;color:#ff1744'>PRASHI ❤️</h1><p style='font-size:28px'>May your day be filled with happiness, laughter and beautiful memories! 💖<br><br>🎁 Replace this text with your real gift link.</p>";}
const x=c.getContext('2d');function R(){c.width=innerWidth;c.height=innerHeight}R();onresize=R;
let p=[...Array(140)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:2+Math.random()*4,v:1+Math.random()*2,h:Math.random()*360}));
(function a(){x.clearRect(0,0,c.width,c.height);p.forEach(o=>{x.fillStyle=`hsl(${o.h},100%,60%)`;x.beginPath();x.arc(o.x,o.y,o.r,0,7);x.fill();o.y+=o.v;if(o.y>innerHeight)o.y=-5;});requestAnimationFrame(a)})();
</script></body></html>

<!DOCTYPE html>
<html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Happy Birthday PRASHI</title>
<style>
*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;font-family:system-ui,sans-serif}
body{background:linear-gradient(-45deg,#ff6b6b,#ffd166,#7b68ee,#48cae4);background-size:400% 400%;animation:bg 12s ease infinite}
@keyframes bg{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}
#c{position:fixed;inset:0}#wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;padding:20px}
h1{margin:0;opacity:0;transform:translateY(-25px)}#h{font-size:18vw;animation:show .8s .2s forwards}#b{font-size:12vw;color:#fff799;animation:show .8s 1.1s forwards}#p{font-size:16vw;color:#ff1744;text-shadow:0 0 12px #fff,0 0 25px #ff4da6;animation:show .8s 2s forwards,glow 1.2s 3s infinite alternate}
@keyframes show{to{opacity:1;transform:none}}@keyframes glow{to{text-shadow:0 0 18px #fff,0 0 45px #ff4da6,0 0 70px #ff0066}}
#sub{margin:15px;font-size:5vw}button{position:absolute;bottom:90px;padding:16px 22px;font-size:5vw;border:0;border-radius:40px;background:#ff2d75;color:#fff;box-shadow:0 0 20px #fff6}
#msg{position:absolute;bottom:28px;font-size:5vw}.f{position:absolute;font-size:8vw;animation:up linear infinite}
@keyframes up{from{transform:translateY(110vh)}to{transform:translateY(-120vh)}}
</style></head><body>
<canvas id=c></canvas><div id=wrap><h1 id=h>HAPPY</h1><h1 id=b>BIRTHDAY</h1><h1 id=p>PRASHI</h1><div id=sub>🎉 Wishing you endless happiness today! 🎂</div><button id=gift>🎁 Tap here to open your Birthday Gift ❤️</button><div id=msg>Catch it if you can 😄</div></div>
<script>
for(let i=0;i<35;i++){let e=document.createElement('div');e.className='f';e.textContent=['🎈','🎊','✨','💖'][i%4];e.style.left=Math.random()*100+'vw';e.style.animationDuration=(6+Math.random()*5)+'s';e.style.animationDelay=(-Math.random()*8)+'s';document.body.appendChild(e);}
const t=["😂 Too Slow!","😜 Almost!","🎂 Try Again!","🤣 Nice Try!","❤️ You Can Do It!"];let n=0;
function mv(){n++;msg.textContent=t[n%t.length];if(n<20){gift.style.left=(5+Math.random()*75)+'%';gift.style.top=(10+Math.random()*70)+'%';}else{gift.onpointerdown=null;gift.onclick=end;msg.textContent="🎁 Okay...you win! Tap it now.";}}
gift.onpointerdown=e=>{e.preventDefault();mv();}
function end(){wrap.innerHTML="<h1 style='opacity:1;font-size:14vw'>🎉 HAPPY BIRTHDAY</h1><h1 style='opacity:1;font-size:16vw;color:#ff1744'>PRASHI ❤️</h1><p style='font-size:6vw'>May every dream of yours come true.<br>You deserve all the happiness in the world! 💖<br><br>🎁 Replace this with your real gift link.</p>";fire=true;}
let x=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight}rs();onresize=rs;
let dots=[...Array(150)].map(()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:2+Math.random()*3,v:1+Math.random()*2,h:Math.random()*360}));let fire=false,parts=[];
function boom(){for(let i=0;i<120;i++)parts.push({x:innerWidth/2,y:innerHeight/2,a:Math.random()*6.28,s:2+Math.random()*5,l:80,h:Math.random()*360})}
function anim(){x.clearRect(0,0,c.width,c.height);dots.forEach(d=>{x.fillStyle=`hsl(${d.h},100%,60%)`;x.beginPath();x.arc(d.x,d.y,d.r,0,7);x.fill();d.y+=d.v;if(d.y>innerHeight)d.y=-5;});if(fire&&parts.length==0)boom();parts.forEach((p,i)=>{x.fillStyle=`hsla(${p.h},100%,60%,${p.l/80})`;x.fillRect(p.x,p.y,3,3);p.x+=Math.cos(p.a)*p.s;p.y+=Math.sin(p.a)*p.s;p.l--;if(p.l<=0)parts.splice(i,1)});requestAnimationFrame(anim)}anim();
</script></body></html>
